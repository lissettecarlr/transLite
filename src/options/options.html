<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>轻量翻译 — 设置</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <div class="page">
    <header class="page-header">
      <div class="header-inner">
        <div class="logo">
          <img src="../images/1.png" width="28" height="28" style="border-radius:7px;display:block;" />
          <div>
            <h1>轻量翻译</h1>
            <p>Lite Translate Settings</p>
          </div>
        </div>
        <div id="save-status" class="save-status"></div>
      </div>
    </header>

    <main class="content">
      <!-- 翻译服务 -->
      <section class="card">
        <div class="card-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
          翻译服务
        </div>

        <div class="field">
          <label class="field-label">选择服务</label>
          <div class="radio-group" id="service-group">
            <label class="radio-card" data-value="google">
              <input type="radio" name="service" value="google" />
              <div class="radio-content">
                <span class="radio-title">Google 翻译（免费）</span>
                <span class="radio-desc">无需配置，直接使用，有频率限制</span>
              </div>
            </label>
            <label class="radio-card" data-value="openai">
              <input type="radio" name="service" value="openai" />
              <div class="radio-content">
                <span class="radio-title">OpenAI 兼容接口</span>
                <span class="radio-desc">支持 OpenAI / DeepSeek / 通义千问 / Moonshot 等</span>
              </div>
            </label>
          </div>
        </div>

        <!-- OpenAI 配置区，默认隐藏 -->
        <div id="openai-config" class="openai-section hidden">
          <div class="field">
            <label class="field-label" for="api-key">API Key <span class="required">*</span></label>
            <div class="input-wrap">
              <input type="password" id="api-key" placeholder="sk-..." autocomplete="off" />
              <button class="toggle-password" type="button" title="显示/隐藏">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>

          <div class="field">
            <label class="field-label" for="api-base-url">API Base URL</label>
            <input type="text" id="api-base-url" placeholder="https://api.openai.com/v1" />
          </div>

          <div class="field">
            <label class="field-label" for="model">模型名称</label>
            <div class="model-row">
              <input type="text" id="model" placeholder="gpt-3.5-turbo" />
              <div class="model-presets">
                <button class="preset-btn" data-model="gpt-5.4-nano">GPT-5.4 nano</button>
                <button class="preset-btn" data-model="qwen3.5-flash">Qwen3.5 Flash</button>
              </div>
            </div>
          </div>

          <div class="field">
            <label class="field-label" for="system-prompt">自定义系统提示词</label>
            <textarea id="system-prompt" rows="3" placeholder="留空使用默认提示词（推荐）"></textarea>
          </div>
        </div>
      </section>

      <!-- 翻译行为 -->
      <section class="card">
        <div class="card-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          翻译行为
        </div>

        <div class="field">
          <label class="field-label">快捷键</label>
          <div class="shortcut-wrap">
            <input type="text" id="shortcut-input" class="shortcut-input" readonly
              placeholder="点击后按下快捷键组合…" autocomplete="off" />
            <button id="shortcut-clear" class="shortcut-clear" title="恢复默认">重置</button>
          </div>
          <div class="field-hint">需包含 Ctrl / Alt / Shift 其中之一 + 字母或数字键</div>
        </div>

        <div class="field">
          <label class="field-label" for="target-lang">目标语言</label>
          <select id="target-lang">
            <option value="zh-CN">简体中文</option>
            <option value="zh-TW">繁体中文</option>
            <option value="en">英文</option>
            <option value="ja">日文</option>
            <option value="ko">韩文</option>
            <option value="fr">法文</option>
            <option value="de">德文</option>
            <option value="es">西班牙文</option>
            <option value="ru">俄文</option>
            <option value="ar">阿拉伯文</option>
            <option value="pt">葡萄牙文</option>
            <option value="it">意大利文</option>
            <option value="vi">越南文</option>
            <option value="th">泰文</option>
          </select>
        </div>

        <div class="field">
          <label class="field-label">译文样式</label>
          <div class="theme-group" id="theme-group">
            <label class="theme-card" data-value="underline">
              <input type="radio" name="theme" value="underline" />
              <span class="theme-preview underline-preview">底线</span>
            </label>
            <label class="theme-card" data-value="block">
              <input type="radio" name="theme" value="block" />
              <span class="theme-preview block-preview">左边框</span>
            </label>
            <label class="theme-card" data-value="highlight">
              <input type="radio" name="theme" value="highlight" />
              <span class="theme-preview highlight-preview">高亮背景</span>
            </label>
          </div>
        </div>

        <div class="field">
          <label class="field-label">译文颜色</label>
          <div class="color-row">
            <label class="color-option">
              <input type="radio" name="translation-color-mode" value="inherit" />
              <span>跟随原文颜色</span>
            </label>
            <label class="color-option">
              <input type="radio" name="translation-color-mode" value="custom" />
              <span>自定义颜色</span>
            </label>
            <div id="color-picker-wrap" class="color-picker-wrap hidden">
              <input type="color" id="translation-color" value="#1a73e8" />
              <span id="color-hex-label" class="color-hex">#1a73e8</span>
            </div>
          </div>
        </div>

        <div class="field">
          <div class="toggle-row">
            <div>
              <div class="toggle-label">自动翻译</div>
              <div class="toggle-desc">打开外文页面时自动翻译</div>
            </div>
            <label class="toggle">
              <input type="checkbox" id="auto-translate" />
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>

        <div class="field">
          <div class="toggle-row">
            <div>
              <div class="toggle-label">翻译按钮 / 导航 / 链接</div>
              <div class="toggle-desc">同时翻译 button、a、label 等 UI 元素（可能影响页面布局）</div>
            </div>
            <label class="toggle">
              <input type="checkbox" id="aggressive-mode" />
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
      </section>

      <!-- 高级设置 -->
      <section class="card">
        <div class="card-title collapsible" id="advanced-toggle">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          高级设置
          <span class="collapse-hint">点击展开</span>
        </div>

        <div id="advanced-content" class="hidden">
          <div class="field">
            <label class="field-label" for="exclude-selectors">排除的 CSS 选择器</label>
            <input type="text" id="exclude-selectors" placeholder=".no-translate, #header, nav" />
            <div class="field-hint">多个选择器用英文逗号分隔，这些元素内的文字不会被翻译</div>
          </div>
          <div class="field">
            <label class="field-label" for="include-selectors">额外翻译的 CSS 选择器</label>
            <input type="text" id="include-selectors" placeholder="span.note, div.footnote, small" />
            <div class="field-hint">补充翻译非标准元素，例如以 span/div 渲染的段落文字</div>
          </div>
        </div>
      </section>

      <div class="bottom-bar">
        <button id="btn-save" class="btn-save">保存设置</button>
        <button id="btn-reset" class="btn-reset">恢复默认</button>
      </div>
    </main>
  </div>

  <script src="../defaults.js"></script>
  <script src="options.js"></script>
</body>
</html>
