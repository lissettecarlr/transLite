<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>轻量翻译</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="header">
    <div class="logo">
      <img src="../images/1.png" width="22" height="22" style="border-radius:5px;display:block;" />
      <span class="logo-text">轻量翻译</span>
    </div>
    <a href="#" id="btn-settings" class="icon-btn" title="设置">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </a>
  </div>

  <div class="status-bar">
    <div id="status-dot" class="status-dot idle"></div>
    <span id="status-text">准备就绪</span>
    <span id="count-badge" class="count-badge hidden">0 段</span>
  </div>

  <div class="lang-row">
    <span class="lang-label">源语言</span>
    <span class="lang-auto">自动检测</span>
    <svg class="arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    <span class="lang-label">目标</span>
    <select id="target-lang" class="lang-select">
      <option value="zh-CN">简体中文</option>
      <option value="zh-TW">繁体中文</option>
      <option value="en">英文</option>
      <option value="ja">日文</option>
      <option value="ko">韩文</option>
      <option value="fr">法文</option>
      <option value="de">德文</option>
      <option value="es">西班牙文</option>
      <option value="ru">俄文</option>
      <option value="ar">阿拉伯文</option>
      <option value="pt">葡萄牙文</option>
    </select>
  </div>

  <div class="actions">
    <button id="btn-translate" class="btn-primary">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m5 8 6 6M4 14l6-6 2-3M2 5h12M7 2h1M22 22l-5-10-5 10M14 18h6"/>
      </svg>
      <span id="btn-text">翻译此页面</span>
    </button>
    <button id="btn-clear" class="btn-secondary hidden">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/>
      </svg>
      关闭翻译
    </button>
  </div>

  <div class="footer">
    <span class="service-badge" id="service-badge">Google</span>
    <span class="hint">Alt+T 快速切换</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
